spring.application.name=CampusConnect

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/campusconnect

# Server Port
server.port=8080

# Logging Configuration
logging.level.root=INFO
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.com.campusconnect=INFO

# Terminal Menu Configuration
campusconnect.terminal.menu.enabled=true
